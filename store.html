<!DOCTYPE html>
<html>
<head>
  <title>Hollow Creek Farm | Store</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/fhy2mav.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <img src="logo.png" width="100">
      <span class="brand-text">Hollow Creek Farm</span>
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="seasons.html">Seasons</a></li>
        <li class="nav-item"><a class="nav-link" href="store.html">Store</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
    </div>

  </div>
</nav>

<div class="container py-5 text-center">

  <h1 class="intro">Farm Store</h1>
  <p class="mini">Fresh goods made right here at Hollow Creek Farm</p>

  <!-- SEARCH BAR -->
  <input type="text" id="searchBar" class="form-control w-50 mx-auto mb-4"
         placeholder="Search products...">
         
  <!-- CART SUMMARY -->
  <div class="mb-4">
    <h4>Cart: <span id="cartCount">0</span> items</h4>
    <h5>Total: $<span id="cartTotal">0</span></h5>

    <div id="cartItems" class="mt-3"></div>
    
    <button class="farm-btn" onclick="checkout()">Checkout</button>
  </div>
  <div class="row g-4" id="storeContainer"></div>

</div>

<footer class="footer">
  Hollow Creek Farm
</footer>

<script src="store.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
